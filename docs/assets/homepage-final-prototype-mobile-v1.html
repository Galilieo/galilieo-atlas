<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Galilieo 首页最终原型 v1 · 移动端评审</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        padding: 34px 18px 60px;
        display: grid;
        justify-items: center;
        gap: 18px;
        color: #dce6f6;
        background: #07111f;
        font-family: Inter, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      }
      header {
        width: min(760px, 100%);
        text-align: center;
      }
      h1 {
        margin: 0;
        font-family: Georgia, 'Noto Serif SC', serif;
        font-size: 26px;
        font-weight: 400;
      }
      p {
        margin: 8px 0 0;
        color: #91a1b8;
        font-size: 12px;
      }
      .phone {
        width: 420px;
        max-width: 100%;
        padding: 14px;
        border: 1px solid #314660;
        border-radius: 38px;
        background: #0c192a;
        box-shadow: 0 30px 90px rgba(0, 0, 0, 0.42);
      }
      iframe {
        width: 390px;
        max-width: 100%;
        height: 844px;
        display: block;
        border: 0;
        border-radius: 27px;
        background: #f3f2ed;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>390 × 844 移动端评审视图</h1>
      <p>iframe 的真实布局视口为 390px；可在内部滚动、切换主题并测试移动菜单。</p>
    </header>
    <div class="phone">
      <iframe
        src="homepage-final-prototype-v1.html?theme=light"
        title="Galilieo 首页移动端原型"
      ></iframe>
    </div>
  </body>
</html>
