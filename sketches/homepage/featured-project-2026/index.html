<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Featured Project — 3 directions</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: #e9e5dd;
        color: #20211f;
        font-family: Arial, 'PingFang SC', sans-serif;
      }
      header {
        max-width: 1180px;
        margin: 0 auto;
        padding: 58px 24px 34px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 32px;
      }
      h1 {
        margin: 0;
        font:
          400 clamp(44px, 7vw, 88px)/0.9 Georgia,
          serif;
        letter-spacing: -0.06em;
      }
      header p {
        align-self: end;
        margin: 0;
        max-width: 470px;
        color: #656860;
        line-height: 1.7;
      }
      main {
        max-width: 1180px;
        margin: 0 auto;
        padding: 0 24px 80px;
        display: grid;
        gap: 24px;
      }
      a {
        display: grid;
        grid-template-columns: 150px 1fr auto;
        align-items: center;
        min-height: 118px;
        padding: 20px 24px;
        border-top: 1px solid rgba(32, 33, 31, 0.32);
        color: inherit;
        text-decoration: none;
        transition:
          padding 0.35s,
          background 0.25s;
      }
      a:last-child {
        border-bottom: 1px solid rgba(32, 33, 31, 0.32);
      }
      a:hover,
      a:focus-visible {
        padding-inline: 34px;
        background: #f3f0e8;
        outline: none;
      }
      .index {
        color: #3c61c9;
        font:
          10px ui-monospace,
          monospace;
        letter-spacing: 0.12em;
      }
      strong {
        display: block;
        margin-bottom: 8px;
        font:
          400 clamp(25px, 3vw, 42px) Georgia,
          serif;
      }
      small {
        color: #696c64;
        font-size: 12px;
      }
      .arrow {
        font-size: 24px;
      }
      @media (max-width: 680px) {
        header {
          grid-template-columns: 1fr;
        }
        a {
          grid-template-columns: 55px 1fr auto;
          padding-inline: 10px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Three ways<br />into the island.</h1>
      <p>
        同一份项目内容，三种完全不同的设计立场。点击进入原型；每个方案都有 hover、键盘焦点与 Reduced
        Motion 降级。
      </p>
    </header>
    <main>
      <a href="./atlas-editorial/"
        ><span class="index">01 / ATLAS</span
        ><span
          ><strong>编辑地图</strong
          ><small>最适合现有浅色编辑体系 · 地图 / 留白 / 双视图</small></span
        ><span class="arrow">↗</span></a
      >
      <a href="./tidal-aperture/"
        ><span class="index">02 / APERTURE</span
        ><span
          ><strong>潮汐窗口</strong
          ><small>最沉浸、视觉冲击最强 · 孔径 / 潮位 / 指针光场</small></span
        ><span class="arrow">↗</span></a
      >
      <a href="./living-archive/"
        ><span class="index">03 / ARCHIVE</span
        ><span
          ><strong>活体档案</strong
          ><small>信息与产品叙事最完整 · 标本 / 能力档案 / 系统切换</small></span
        ><span class="arrow">↗</span></a
      >
    </main>
  </body>
</html>
