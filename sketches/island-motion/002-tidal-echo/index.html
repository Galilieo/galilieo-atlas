<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>心屿动效原型 B · 潮汐回声</title>
    <style>
      * {
        box-sizing: border-box;
      }
      :root {
        --paper: #f5f1e9;
        --soft: #f8f5ee;
        --ink: #1f211f;
        --muted: #73766e;
        --line: rgba(31, 33, 31, 0.18);
        --blue: #3c61c9;
        --blue-soft: #e7ecfa;
        --ease: cubic-bezier(0.22, 1, 0.36, 1);
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 34px;
        color: var(--ink);
        background: var(--paper);
        font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      }
      .prototype {
        width: min(100%, 1020px);
      }
      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .toolbar button {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 8px 14px;
        color: inherit;
        background: transparent;
        cursor: pointer;
      }
      .card {
        position: relative;
        min-height: 700px;
        overflow: hidden;
        border: 1px solid rgba(31, 33, 31, 0.22);
        background: rgba(248, 245, 238, 0.94);
        box-shadow: 0 26px 70px rgba(58, 54, 46, 0.07);
        transition:
          transform 420ms var(--ease),
          box-shadow 420ms var(--ease),
          border-color 300ms ease;
      }
      .card:hover {
        transform: translateY(-5px);
        border-color: rgba(60, 97, 201, 0.46);
        box-shadow: 0 38px 90px rgba(58, 54, 46, 0.12);
      }
      .copy {
        display: flex;
        justify-content: space-between;
        gap: 24px;
        padding: 44px 42px 0;
      }
      h1 {
        margin: 0;
        font:
          400 clamp(42px, 6vw, 65px)/0.95 Georgia,
          serif;
        letter-spacing: -0.055em;
      }
      h1 span {
        margin-left: 8px;
        font:
          400 0.54em/1 'Microsoft YaHei',
          sans-serif;
        letter-spacing: -0.04em;
      }
      .subtitle {
        margin: 18px 0 0;
        color: #343733;
        font:
          18px Georgia,
          'Microsoft YaHei',
          serif;
      }
      .arrow {
        width: 52px;
        height: 52px;
        display: grid;
        place-items: center;
        flex: none;
        border: 1px solid var(--line);
        border-radius: 50%;
        font-size: 24px;
        transition:
          transform 240ms var(--ease),
          background 240ms;
      }
      .card:hover .arrow {
        transform: rotate(8deg) translate(2px, -2px);
        background: var(--blue-soft);
      }
      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 30px 42px 0;
      }
      .tag {
        padding: 8px 13px;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: #575b54;
        font-size: 11px;
      }
      .scene {
        position: absolute;
        inset: 250px 0 58px;
        overflow: hidden;
        background: radial-gradient(ellipse at 50% 55%, rgba(255, 255, 255, 0.78), transparent 48%);
      }
      .tide {
        position: absolute;
        inset: 25% -15% 2%;
        opacity: 0.6;
        background: linear-gradient(
          105deg,
          transparent 20%,
          rgba(132, 151, 146, 0.06) 40%,
          rgba(255, 255, 255, 0.28) 50%,
          rgba(132, 151, 146, 0.05) 60%,
          transparent 80%
        );
        transform: translateX(-18%);
        animation: tide 9.6s ease-in-out infinite;
        pointer-events: none;
      }
      .ring,
      .ring::before {
        position: absolute;
        top: 55%;
        left: 50%;
        width: 70%;
        height: 27%;
        border: 1px solid rgba(31, 33, 31, 0.06);
        border-radius: 50%;
        content: '';
        transform: translate(-50%, -50%) scale(0.86);
        animation: ring 7.8s ease-out infinite;
      }
      .ring::before {
        top: 50%;
        width: 100%;
        height: 100%;
        animation-delay: 3.9s;
      }
      .island {
        position: absolute;
        top: 47%;
        left: 50%;
        width: min(95%, 780px);
        transform: translate(-50%, -50%);
        animation: float 9s ease-in-out infinite;
        transition: filter 500ms;
      }
      .card:hover .island {
        filter: contrast(1.05);
      }
      .island img {
        display: block;
        width: 100%;
        height: auto;
        filter: contrast(1.09) saturate(0.82);
      }
      .footer {
        position: absolute;
        inset: auto 0 0;
        min-height: 58px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 22px;
        border-top: 1px solid var(--line);
        color: #96988f;
        font:
          10px Consolas,
          monospace;
      }
      .paused * {
        animation-play-state: paused !important;
      }
      @keyframes float {
        0%,
        100% {
          transform: translate(-50%, -50%);
        }
        50% {
          transform: translate(-50%, calc(-50% - 2.5px));
        }
      }
      @keyframes tide {
        0%,
        100% {
          transform: translateX(-22%);
          opacity: 0.38;
        }
        50% {
          transform: translateX(22%);
          opacity: 0.72;
        }
      }
      @keyframes ring {
        0% {
          opacity: 0;
          transform: translate(-50%, -50%) scale(0.84);
        }
        20% {
          opacity: 0.16;
        }
        75%,
        100% {
          opacity: 0;
          transform: translate(-50%, -50%) scale(1.12);
        }
      }
      @media (max-width: 640px) {
        body {
          padding: 14px;
        }
        .card {
          min-height: 560px;
        }
        .copy {
          padding: 28px 22px 0;
        }
        h1 {
          font-size: 40px;
        }
        h1 span {
          display: block;
          margin: 9px 0 0;
        }
        .tags {
          padding: 22px 22px 0;
        }
        .scene {
          inset: 225px 0 50px;
        }
        .island {
          width: 114%;
        }
        .footer {
          font-size: 8px;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation: none !important;
          transition: none !important;
        }
      }
    </style>
  </head>
  <body>
    <main class="prototype">
      <div class="toolbar">
        <span>B / 潮汐回声 · 水面更有存在感</span><button id="toggle">暂停动效</button>
      </div>
      <article class="card" id="card">
        <div class="copy">
          <div>
            <h1>heart-island <span>心屿</span></h1>
            <p class="subtitle">AI 情绪记录与匿名互助社区</p>
          </div>
          <span class="arrow">↗</span>
        </div>
        <div class="tags">
          <span class="tag">Spring Boot</span><span class="tag">Vue 3</span
          ><span class="tag">MySQL</span><span class="tag">LLM API</span>
        </div>
        <div class="scene">
          <div class="tide"></div>
          <div class="ring"></div>
          <div class="island">
            <img src="../../src/assets/svg/island-reference-no-heart-vector.svg" alt="" />
          </div>
        </div>
        <footer class="footer"><span>Building with purpose</span><span>demo v0.1</span></footer>
      </article>
    </main>
    <script>
      const b = document.querySelector('#toggle'),
        c = document.querySelector('#card');
      b.onclick = () => {
        const p = c.classList.toggle('paused');
        b.textContent = p ? '播放动效' : '暂停动效';
      };
    </script>
  </body>
</html>
