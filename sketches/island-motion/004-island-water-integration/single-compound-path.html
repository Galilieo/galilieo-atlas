<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>C · 单一复合路径</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #ece9e2;
        color: #292823;
        font-family: Inter, system-ui, sans-serif;
      }
      main {
        width: min(1120px, 94vw);
        padding: 26px;
      }
      .meta {
        display: flex;
        justify-content: space-between;
        align-items: end;
        margin-bottom: 14px;
      }
      .eyebrow {
        font:
          11px ui-monospace,
          monospace;
        letter-spacing: 0.12em;
        color: #77736b;
      }
      .meta h1 {
        margin: 5px 0 0;
        font:
          500 24px Georgia,
          serif;
      }
      .meta p {
        margin: 0;
        max-width: 520px;
        color: #716d65;
        font-size: 13px;
        line-height: 1.6;
      }
      .frame {
        border: 1px solid #c9c4ba;
        background: #f8f6f1;
        padding: 18px;
        box-shadow: 0 22px 60px #423d3510;
      }
      .stage {
        overflow: hidden;
        background: radial-gradient(ellipse at 50% 62%, #fff 0, #f8f6f1 47%, #f5f2ec 100%);
      }
      svg {
        display: block;
        width: 100%;
        height: auto;
      }
      .all {
        fill: none;
        stroke: #716c64;
        stroke-width: 2.8;
        stroke-linecap: round;
        stroke-linejoin: round;
        opacity: 0.48;
      }
      .guides {
        opacity: 0;
        fill: none;
        stroke: #356ae6;
        stroke-width: 1.2;
        stroke-dasharray: 6 8;
      }
      .construction .all {
        stroke: #356ae6;
        opacity: 0.8;
      }
      .construction .guides {
        opacity: 0.45;
      }
      footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 14px;
        color: #6f6b63;
        font-size: 12px;
      }
      button {
        border: 1px solid #bdb7ac;
        background: transparent;
        padding: 8px 12px;
        color: inherit;
        cursor: pointer;
      }
      button:hover {
        border-color: #69655e;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="meta">
        <div>
          <div class="eyebrow">CONCEPT C · MOST UNIFIED</div>
          <h1>单一复合路径</h1>
        </div>
        <p>岛屿和所有涟漪全部放进同一个 path，线宽与透明度完全一致；最统一，但前后景层次最弱。</p>
      </div>
      <div class="frame">
        <div class="stage" id="stage">
          <svg viewBox="0 0 1000 360" role="img" aria-label="单一复合路径心形负形岛屿与涟漪">
            <path
              class="all"
              d="M42 116 C180 80 274 74 350 78 M650 78 C730 74 822 80 958 116 M72 146 C196 104 286 100 347 112 M653 112 C718 100 808 104 928 146 M85 171 C128 82 288 62 365 119 M635 119 C715 62 872 82 915 171 M915 171 C870 302 130 302 85 171 M855 171 C816 268 184 268 145 171 M260 160 C285 150 305 150 330 155 C370 142 390 115 430 105 C458 98 474 72 493 72 C505 72 512 82 519 94 C521 98 523 98 526 94 C534 82 542 72 554 72 C576 73 590 96 614 105 C648 116 675 142 670 155 C695 150 715 150 740 160 C700 205 300 205 260 160 Z"
            />
            <g class="guides">
              <rect x="300" y="62" width="400" height="138" rx="12" />
              <line x1="500" y1="48" x2="500" y2="214" />
            </g>
          </svg>
        </div>
      </div>
      <footer>
        <span>没有岛屿层和水纹层之分，代价是无法单独强调主体。</span
        ><button type="button" id="toggle">显示路径范围</button>
      </footer>
    </main>
    <script>
      const s = document.querySelector('#stage'),
        b = document.querySelector('#toggle');
      b.onclick = () => {
        s.classList.toggle('construction');
        b.textContent = s.classList.contains('construction') ? '隐藏路径范围' : '显示路径范围';
      };
    </script>
  </body>
</html>
